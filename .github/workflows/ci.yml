name: Bioinfo-CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Using Micromamba is the fastest way to use Conda in CI/CD
      - name: Set up Conda Environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml # This uses your big list of bioinfo tools
          cache-environment: true

      - name: Install CI Tools
        shell: bash -l {0}
        run: |
          # Install ruff and nbconvert into the conda env
          python -m pip install ruff nbconvert

      - name: Run Ruff (Linting)
        shell: bash -l {0}
        run: |
          # This checks your notebooks and scripts for errors/messy code
          ruff check . --output-format=github

      - name: Convert and Compile Notebooks
        shell: bash -l {0}
        run: |
          # 1. Convert all notebooks in the notebooks folder to python scripts
          jupyter nbconvert --to python notebooks/*.ipynb
          
          # 2. Loop through and check for syntax errors
          for file in notebooks/*.py; do
            echo "Checking $file..."
            python -m py_compile "$file"
          donename: Bioinfo-CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jupyter nbconvert scanpy scvi-tools

      - name: Convert and Compile Notebooks
        run: |
          # 1. Convert all notebooks in the notebooks folder to python scripts
          jupyter nbconvert --to python notebooks/*.ipynb
          
          # 2. Loop through and check for syntax errors
          for file in notebooks/*.py; do
            echo "Checking $file..."
            python -m py_compile "$file"
          done
